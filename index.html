<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portal - Israeli Employment Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://ichef.bbci.co.uk/ace/standard/976/cpsprodpb/13A53/production/_91076408_screens976.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="glass-panel rounded-2xl shadow-2xl p-8 max-w-3xl w-full border-t-4 border-blue-600">
        
        <div class="text-center mb-8">
            <img src="https://www.taasuka.gov.il/media/rmibep2i/logo25long5.svg" 
                 alt="שירות התעסוקה" 
                 class="h-14 w-auto mx-auto mb-6 drop-shadow-sm">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Haredi Integration</h1>
            <p class="text-blue-700 font-medium mt-1">Predictive Analytics Portal • Cloud Architecture</p>
        </div>

        <form id="predictForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            
            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Haredim Proportion</label>
                <input type="number" step="0.01" id="Prop_Haredim" value="0.85" class="mt-1 block w-full rounded border-gray-300 p-2 focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            
            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Kosher Phone (0 or 1)</label>
                <input type="number" id="CasherPhone" value="1" min="0" max="1" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Haredi Cities (0 or 1)</label>
                <input type="number" id="HarediCities" value="1" min="0" max="1" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Military Service Type (ID)</label>
                <input type="number" id="MilitaryServiceTypeID" value="4" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Extreme Education Age</label>
                <input type="number" id="F_Age_Education_extreme" value="0" min="0" max="1" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Extreme Age per Child</label>
                <input type="number" id="F_Age_per_Child_extreme" value="0" min="0" max="1" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Age / Education Ratio</label>
                <input type="number" step="0.01" id="F_Age_Education" value="3.2" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Age / Child Ratio</label>
                <input type="number" step="0.01" id="F_Age_per_Child" value="1.5" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="bg-white/60 p-3 rounded-lg border border-gray-200 shadow-sm md:col-span-2">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Haredi Spouse (0 or 1)</label>
                <input type="number" id="SpouseHaredi" value="1" min="0" max="1" class="mt-1 block w-full rounded border-gray-300 p-2" required>
            </div>

            <div class="md:col-span-2 mt-4">
                <button type="submit" id="submitBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 text-lg uppercase tracking-wider">
                    Analyze Candidate Profile
                </button>
            </div>
        </form>

        <div id="resultBox" class="mt-6 p-6 rounded-xl bg-gray-50 border-2 border-dashed border-gray-300 text-center hidden transition-all duration-300">
            <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">AI Classification Result</h3>
            <div id="resultText" class="mt-2 text-gray-400">--</div>
            <p class="text-xs text-gray-400 mt-4 border-t pt-2">Data successfully securely logged for auditing.</p>
        </div>
    </div>

    <script>
        // URL API GATEWAY 
        const API_URL = "https://t8a37qv4k1.execute-api.us-east-1.amazonaws.com/prod/predict";

        document.getElementById('predictForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            btn.innerHTML = "Processing via AWS SageMaker...";
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btn.disabled = true;
            
            resultBox.className = "mt-6 p-6 rounded-xl bg-gray-50 border-2 border-dashed border-gray-300 text-center transition-all duration-300";
            resultText.innerHTML = '<span class="animate-pulse text-lg text-gray-500 font-medium">Evaluating profile probabilities...</span>';

            const payload = {
                "Prop_Haredim": parseFloat(document.getElementById('Prop_Haredim').value),
                "CasherPhone": parseInt(document.getElementById('CasherPhone').value),
                "HarediCities": parseInt(document.getElementById('HarediCities').value),
                "F_Age_per_Child_extreme": parseInt(document.getElementById('F_Age_per_Child_extreme').value),
                "F_Age_Education_extreme": parseInt(document.getElementById('F_Age_Education_extreme').value),
                "MilitaryServiceTypeID": parseInt(document.getElementById('MilitaryServiceTypeID').value),
                "F_Age_Education": parseFloat(document.getElementById('F_Age_Education').value),
                "F_Age_per_Child": parseFloat(document.getElementById('F_Age_per_Child').value),
                "SpouseHaredi": parseInt(document.getElementById('SpouseHaredi').value)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();
                const scoreValue = data.prediction * 100;
                
                let businessMessage = "";
                
                if (scoreValue >= 50) {
                    businessMessage = `<div class="text-4xl font-extrabold text-blue-700 mb-2">${scoreValue.toFixed(1)}% Match</div>
                                       <div class="text-xl font-bold text-gray-900 mb-1">Haredi Track Recommended</div>
                                       <div class="text-md text-gray-700 font-medium">Eligible for specialized tech-training programs with religious accommodations.</div>`;
                    
                    resultBox.classList.replace('border-gray-300', 'border-blue-300');
                    resultBox.classList.replace('bg-gray-50', 'bg-blue-50');
                } else {
                    businessMessage = `<div class="text-4xl font-extrabold text-gray-600 mb-2">${scoreValue.toFixed(1)}% Match</div>
                                       <div class="text-xl font-bold text-gray-900 mb-1">Standard Track</div>
                                       <div class="text-md text-gray-600 font-medium">Profile does not match specialized religious programs. Proceed with general placement.</div>`;
                    
                    resultBox.classList.replace('border-gray-300', 'border-gray-300');
                    resultBox.classList.replace('bg-gray-50', 'bg-gray-100');
                }

                resultText.innerHTML = businessMessage;

            } catch (error) {
                resultBox.classList.replace('border-gray-300', 'border-red-400');
                resultBox.classList.replace('bg-gray-50', 'bg-red-50');
                resultText.innerHTML = `<div class="text-xl font-bold text-red-600">Connection Error: ${error.message}</div>`;
            } finally {
                btn.innerHTML = "Analyze Candidate Profile";
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
